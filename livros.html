<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOKWORMS</title>
</head>
<body style="margin: 0; font-family: sans-serif; background-color: #f4f6f9; padding: 20px;">
    <div style="max-width: 1000px; margin: 0 auto; text-align: center;">
        <h2 style="color: #333;">Buscar Livros</h2>
        <div style="margin-bottom: 30px;">
            <input type="text" id="input-busca" placeholder="Digite o título do livro" style="padding: 12px; width: 60%; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; outline: none;">
            <button onclick="buscarLivro(document.getElementById('input-busca').value)" style="padding: 12px 20px; background-color: #03dac6; border: none; border-radius: 6px; font-weight: bold; color: white; cursor: pointer; font-size: 1rem;">
                Pesquisar
            </button>
        </div>
        <div id="grid-livros" style="
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
            padding: 10px;
        ">
            <p style="color: #666; grid-column: 1 / -1;">Digite algo acima para pesquisar livros...</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
